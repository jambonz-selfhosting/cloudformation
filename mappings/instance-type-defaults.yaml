# Instance type defaults per region for jambonz CloudFormation templates
# These defaults are based on AWS instance type availability per region
#
# Structure: instance-types-<size>.<region>.<arch>.<RoleDefault>
#   amd64: x86_64 tiering  c5n -> c5 -> t3
#   arm64: Graviton tiering c7gn -> c7g -> t4g, with c6g (Graviton2)
#          fallback where none of those exist (e.g. me-central-1).
#          Recording role uses the burstable tier (t4g, or c6g fallback).
#          arm64 values are resolved against live instance-type availability.
#
# For AMI mappings, see ami-mappings.yaml

